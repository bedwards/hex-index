    <h1>#每天來點斯多葛(10)</h1>
    <p class="author">By 一個斯多葛主義者的日常課題</p>
    
    <div class="content">
      <p>今天的思考題是：「...什麼叫見過大世面？那便是——能夠享受最好的，也能夠承受最壞的。...要對不好的事情提前做好准備，因為：我們對有准備的，並且充分理解了的挫折承受力最強。」</p><p>首先，"能夠享受最好的，也能夠承受最壞的" 這句話體現了斯多噶哲學的靈活性和平衡性。</p><p>斯多噶哲學教導我們，內在的美德和自我控制是最重要的，不論處於什麼樣的外部環境。</p><p>同時，這個觀點也突出了斯多噶哲學對於「預先準備」和「自我調節」的重視。</p><p>通過對挫折和困難有充分的准備和理解，我們就能更好地面對它們，而不會受到過度的情緒影響。</p>
    </div>
  </article>
