    <h1>#每天來點斯多葛(13)</h1>
    <p class="author">By 一個斯多葛主義者的日常課題</p>
    
    <div class="content">
      <p><span>今天的思考題是：</span><strong>「不是事物本身困擾我們，而是我們對事物的看法困擾我們。」</strong></p><p>這一段話強調的是人們對事件的詮釋和看法如何影響他們的情感和反應。</p><p>換句話說，我們的主觀評價和解釋經常是導致痛苦或困擾的真正原因，而不是外部事件本身。</p><p>當我們面對自己無力控制的事件或意外時，我們可以嘗試重新評價和調整自己對事情的觀點，以達到內心的平和。</p><p>這樣做，雖然不會立即改變事件本身，但是能夠讓我們更有效地應對生活中的各種挑戰，並減少不必要的心理壓力。</p><p>如果在結合從「積極心理學」中學到「主動性理論」，透過行動就再可以提高改變當前狀態的機率。</p>
    </div>
  </article>
