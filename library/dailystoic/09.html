    <h1>#每天來點斯多葛(09)</h1>
    <p class="author">By 一個斯多葛主義者的日常課題</p>
    
    <div class="content">
      <p><span>今天的思考題：</span><strong>「...愛我們所愛的，但要知道我們所愛的都如朝露。」</strong></p><p>人要專注於自己可以控制的事物，而接受或淡然處理自己不能控制的事物。</p><p>愛情、友情和其他親密關係當然是生活中非常重要的部分，但它們也是不可預測和不可控制的。</p><p>這句話強調了生命和情感的無常性，我們要珍惜當下，但同時也要做好失去它們的心理準備。</p><p>這樣的心態可以幫助我們更好地面對生活的不確定性，並在遭遇逆境時保持內心的平靜。</p>
    </div>
