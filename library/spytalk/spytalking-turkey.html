<html><head></head><body><p>It’s a tough day for a lot of people—especially the sick and poor, the lonely and wanting. I’m taking the liberty of re-posting a Thanksgiving Day reminiscence of a few years back. Its message remains true: It’s better to give than receive. </p><div class="digest-post-embed" data-attrs="{&quot;nodeId&quot;:&quot;f419a757-63b1-4080-a094-f80c9e7eff84&quot;,&quot;caption&quot;:&quot;I ARRIVED IN SAIGON a couple of days before Thanksgiving in 1968. I had yet to receive my permanent assignment to run a spy operation up north, so I had a few free days on my hands. Somebody – I can't remember who, maybe one of my superiors—suggested we volunteer to help out at a local Catholic orphanage.&quot;,&quot;cta&quot;:&quot;Read full story&quot;,&quot;showBylines&quot;:true,&quot;size&quot;:&quot;lg&quot;,&quot;isEditorNode&quot;:true,&quot;title&quot;:&quot;A Young Spy's Unforgettable Thanksgiving&quot;,&quot;publishedBylines&quot;:[{&quot;id&quot;:116398,&quot;name&quot;:&quot;Jeff Stein&quot;,&quot;bio&quot;:&quot;Founding editor SpyTalk.co. Veteran natsec reporter. Pvsly Newsweek, WaPo, founding editor CQ/Homeland Security, dep foreign news editor UPI. Tips welcome via text at Signal 202-812-3034, email via spytalk@me.com and Twitter @talk_spy and @spytalker &quot;,&quot;photo_url&quot;:&quot;https://bucketeer-e05bbc84-baa3-437e-9518-adb32be77984.s3.amazonaws.com/public/images/5262392b-31d7-418a-9da2-231b9e9bd825_320x320.jpeg&quot;,&quot;is_guest&quot;:false,&quot;bestseller_tier&quot;:1000}],&quot;post_date&quot;:&quot;2023-11-22T22:28:00.874Z&quot;,&quot;cover_image&quot;:&quot;https://substackcdn.com/image/fetch/$s_!fAte!,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F1c8208c7-bd9a-4d3b-bebf-c51fbdc3548d.heic&quot;,&quot;cover_image_alt&quot;:null,&quot;canonical_url&quot;:&quot;https://www.spytalk.co/p/a-young-spys-unforgettable-thanksgiving&quot;,&quot;section_name&quot;:null,&quot;
