# source-bios.yml
#
# "About this source" footer data — rendered under every source excerpt on
# consolidated commentary pages and on single-source article pages. Speechify
# reads these aloud, so keep prose clean and factual.
#
# Schema (per entry, keyed by publication slug):
#
#   <publication-slug>:
#     name:                  string   # Human-readable publication name (for sanity)
#     type:                  string   # "independent newsletter" | "individual creator" |
#                                     # "corporate outlet" | "academic" | "think-tank organ" |
#                                     # "public broadcaster" | "nonprofit" | etc.
#     country:               string   # ISO country name, e.g. "United States"
#     us_state:              string?  # Optional, only if US-based and known
#     funding_model:         string   # e.g. "paid subscriptions", "ads + Patreon",
#                                     # "foundation grants", "university affiliation"
#     affiliations:          string[] # Think tanks, parent companies, parties, etc.
#     political_leaning:     string   # OPINIONATED sentence-form description. NOT a
#                                     # left/center/right label. Editorially owned by
#                                     # Hex Index, not outsourced to AllSides/Ad Fontes.
#                                     # Example: "Center-left, skeptical of US foreign-
#                                     # policy consensus, sympathetic to organized labor."
#     url:                   string   # Canonical "about" or homepage URL cited for
#                                     # the factual claims in this bio.
#     bio_last_audited_at:   string   # ISO date (YYYY-MM-DD)
#
# Authoring rules:
# - Stick to facts the source has published about itself. Cite `url` for each bio.
# - Leaning is a 1-sentence editorial judgement, not a label. Own it.
# - When a source's stance materially changes, update the entry and bump
#   `bio_last_audited_at`.
#
# See issue #487 for background.

